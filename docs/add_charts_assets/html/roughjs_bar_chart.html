<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rough.js bar chart</title>
  <style>
    body {
      background: #f8faf7;
      margin: 0;
      padding: 24px;
    }
    svg {
      background: linear-gradient(135deg, #eef2ff, #fff7ed 60%, #fdf2f8);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }
  </style>
</head>
<body>
  <svg id="chart" width="820" height="500" viewBox="0 0 820 500"></svg>

  <script src="https://unpkg.com/roughjs/bundled/rough.js"></script>
  <script>
    const svg = document.getElementById("chart");
    const rc = rough.svg(svg);
    const data = [
      { label: "BP", value: 30, color: "#ffb4a2" },
      { label: "SBP", value: 18, color: "#99f6e4" },
      { label: "DGPw", value: 22, color: "#bfdbfe" }
    ];
    const max = 35;
    const chart = { x: 120, y: 390, w: 620, h: 280 };

    svg.appendChild(rc.line(chart.x, chart.y, chart.x + chart.w, chart.y, { stroke: "#111827", strokeWidth: 3 }));
    svg.appendChild(rc.line(chart.x, chart.y, chart.x, chart.y - chart.h, { stroke: "#111827", strokeWidth: 3 }));

    data.forEach((d, i) => {
      const bw = 90;
      const gap = 95;
      const x = chart.x + 80 + i * (bw + gap);
      const h = d.value / max * chart.h;
      const y = chart.y - h;
      svg.appendChild(rc.rectangle(x, y, bw, h, {
        stroke: "#111827",
        strokeWidth: 2.5,
        fill: d.color,
        fillStyle: "hachure",
        hachureAngle: -35,
        roughness: 1.7
      }));
      text(d.label, x + 18, chart.y + 38, 24);
      text(String(d.value), x + 28, y - 12, 22);
    });

    text("Runtime Comparison", 250, 72, 42);
    text("time (s)", 35, 245, 24, -90);

    function text(value, x, y, size, rotate = 0) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", "text");
      node.setAttribute("x", x);
      node.setAttribute("y", y);
      node.setAttribute("font-size", size);
      node.setAttribute("font-family", "Comic Sans MS, Bradley Hand, Segoe Print, cursive");
      node.setAttribute("fill", "#111827");
      if (rotate) node.setAttribute("transform", `rotate(${rotate} ${x} ${y})`);
      node.textContent = value;
      svg.appendChild(node);
    }
  </script>
</body>
</html>
