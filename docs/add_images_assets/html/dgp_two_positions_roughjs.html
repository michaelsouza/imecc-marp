<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DGP two possible positions</title>
  <style>
    body {
      background: #f8faf7;
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 24px;
    }
    svg {
      background: linear-gradient(135deg, #eef2ff, #fff7ed 60%, #fdf2f8);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }
  </style>
</head>
<body>
  <svg id="figure" width="900" height="520" viewBox="0 0 900 520"></svg>

  <script src="https://unpkg.com/roughjs/bundled/rough.js"></script>
  <script>
    const svg = document.getElementById("figure");
    const rc = rough.svg(svg);

    const opts = { stroke: "#111827", strokeWidth: 3, roughness: 1.6, bowing: 1.2 };
    const known = { stroke: "#0f766e", strokeWidth: 3, fill: "#99f6e4", fillStyle: "hachure", hachureAngle: -35 };
    const candidate = { stroke: "#e11d48", strokeWidth: 3, fill: "#fecdd3", fillStyle: "zigzag", hachureAngle: -20 };
    const guide = { stroke: "#6b7280", strokeWidth: 2, roughness: 1.4, strokeLineDash: [8, 8] };

    svg.appendChild(rc.line(120, 370, 760, 370, opts));
    svg.appendChild(rc.line(120, 370, 120, 90, opts));

    const points = {
      x1: [260, 320],
      x2: [430, 320],
      x3: [345, 170],
      xp: [615, 205],
      xm: [615, 435]
    };

    svg.appendChild(rc.polygon([points.x1, points.x2, points.x3], {
      stroke: "#0f766e",
      strokeWidth: 2.5,
      fill: "#ccfbf1",
      fillStyle: "hachure",
      roughness: 1.4
    }));

    svg.appendChild(rc.line(points.x1[0], points.x1[1], points.xp[0], points.xp[1], guide));
    svg.appendChild(rc.line(points.x2[0], points.x2[1], points.xp[0], points.xp[1], guide));
    svg.appendChild(rc.line(points.x3[0], points.x3[1], points.xp[0], points.xp[1], guide));
    svg.appendChild(rc.line(points.x1[0], points.x1[1], points.xm[0], points.xm[1], guide));
    svg.appendChild(rc.line(points.x2[0], points.x2[1], points.xm[0], points.xm[1], guide));
    svg.appendChild(rc.line(points.x3[0], points.x3[1], points.xm[0], points.xm[1], guide));

    for (const [label, p] of Object.entries({ "x1": points.x1, "x2": points.x2, "x3": points.x3 })) {
      svg.appendChild(rc.circle(p[0], p[1], 46, known));
      addText(label, p[0] - 14, p[1] + 8, 24);
    }

    svg.appendChild(rc.circle(points.xp[0], points.xp[1], 54, candidate));
    svg.appendChild(rc.circle(points.xm[0], points.xm[1], 54, candidate));
    addText("x4+", points.xp[0] - 24, points.xp[1] + 8, 24);
    addText("x4-", points.xm[0] - 24, points.xm[1] + 8, 24);
    addText("two feasible positions", 360, 65, 38);
    addText("known simplex", 220, 410, 22);
    addText("candidate reflections", 540, 120, 22);

    function addText(text, x, y, size) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", "text");
      node.setAttribute("x", x);
      node.setAttribute("y", y);
      node.setAttribute("font-size", size);
      node.setAttribute("font-family", "Comic Sans MS, Bradley Hand, Segoe Print, cursive");
      node.setAttribute("fill", "#111827");
      node.textContent = text;
      svg.appendChild(node);
    }
  </script>
</body>
</html>
